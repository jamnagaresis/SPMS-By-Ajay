name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs at 00:00 every 3 days
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_URL or SUPABASE_ANON_KEY secret is not set in GitHub Repository Secrets."
            exit 1
          fi
          
          echo "Pinging Supabase REST API to keep project active..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "Successfully pinged Supabase. HTTP Status: $RESPONSE"
          else
            echo "Failed to ping Supabase. HTTP Status: $RESPONSE. Check your secrets and Supabase project status."
            exit 1
          fi
